<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="description" content="Administrá tu lista de compras y compartila por WhatsApp.">
  <title>ListBuy · Lista de Compras</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- ═══ HEADER ══════════════════════════════════════════════════ -->
  <header class="app-header">
    <div class="hdr-left"></div>

    <div class="logo-wrap">
      <img
        class="logo-img"
        src="https://i.postimg.cc/ht3b8W8T/Gemini-Generated-Image-kl7kxzkl7kxzkl7k-removebg-preview.png"
        alt="ListBuy">
    </div>

    <div class="hdr-right">
      <div class="sync-pill syncing" id="syncPill">
        <span class="dot"></span>
        <span id="syncLabel">Conectando…</span>
      </div>
      <button class="btn-icon" onclick="toggleTheme()" title="Cambiar tema">
        <i class="bi bi-moon-fill" id="themeIcon"></i>
      </button>
    </div>
  </header>

  <!-- ═══ MAIN ════════════════════════════════════════════════════ -->
  <div class="scroll-area">

    <!-- Lista de compras -->
    <div class="card">
      <h2 class="card-title">
        <span class="ico"><i class="bi bi-cart3"></i></span>
        Lista de Compras
        <span class="badge-pill" id="countBadge">0</span>
      </h2>

      <!-- Formulario -->
      <div class="add-form">
        <input
          id="iName"
          class="field"
          type="text"
          placeholder="Nombre del producto…"
          maxlength="50"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false">
        <div class="input-row">
          <input
            id="iPrice"
            class="field"
            type="number"
            placeholder="Precio (opcional)"
            min="0"
            step="0.01"
            inputmode="decimal">
          <input
            id="iQty"
            class="field"
            type="number"
            placeholder="Cant. (defecto 1)"
            min="1"
            max="999"
            inputmode="numeric">
        </div>
        <button class="btn-add" onclick="addItem()">
          <i class="bi bi-plus-lg"></i> Agregar producto
        </button>
      </div>

      <!-- Items -->
      <ul id="shoppingList">
        <li class="empty-state" id="emptyState">
          <i class="bi bi-cart3 ei"></i>
          <p>Tu lista está vacía</p>
          <small>Agregá productos arriba para empezar</small>
        </li>
      </ul>

      <!-- Total -->
      <div class="total-bar" id="totalBar" hidden>
        <div>
          <div class="total-lbl">Total</div>
          <div class="total-cnt" id="totalCnt"></div>
        </div>
        <div class="total-amt" id="totalAmt">$0</div>
      </div>

      <!-- Generar ticket -->
      <button class="btn-finalize" id="btnFinalize" hidden onclick="openSheet()">
        <i class="bi bi-receipt-cutoff"></i> Generar Ticket
      </button>
    </div>

  </div><!-- /scroll-area -->

  <!-- ═══ TICKET SHEET ════════════════════════════════════════════ -->
  <div class="overlay" id="overlay" onclick="overlayClick(event)">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">🛒 Tu Ticket</div>
      <pre class="ticket-box" id="ticketBox"></pre>
      <button class="btn-wa" onclick="shareWA()">
        <i class="bi bi-whatsapp" style="font-size:20px"></i>
        Enviar por WhatsApp
      </button>
      <button class="btn-dismiss" onclick="closeSheet()">Cerrar</button>
    </div>
  </div>

  <!-- ═══ EDIT SHEET ══════════════════════════════════════════════ -->
  <div class="overlay" id="editOverlay" onclick="editOverlayClick(event)">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">✏️ Editar producto</div>

      <div class="edit-field-group">
        <label class="edit-field-label" for="eName">Nombre</label>
        <input
          id="eName"
          class="field"
          type="text"
          placeholder="Nombre del producto…"
          maxlength="50"
          autocomplete="off">
      </div>

      <div class="input-row" style="margin-bottom:14px">
        <div>
          <label class="edit-field-label" for="ePrice">Precio</label>
          <input
            id="ePrice"
            class="field"
            type="number"
            placeholder="0.00"
            min="0"
            step="0.01"
            inputmode="decimal">
        </div>
        <div>
          <label class="edit-field-label" for="eQty">Cantidad</label>
          <input
            id="eQty"
            class="field"
            type="number"
            placeholder="1"
            min="1"
            max="999"
            inputmode="numeric">
        </div>
      </div>

      <button class="btn-add" onclick="saveEdit()">
        <i class="bi bi-check-lg"></i> Guardar cambios
      </button>
      <button class="btn-dismiss" style="margin-top:10px" onclick="closeEditSheet()">Cancelar</button>
    </div>
  </div>

  <!-- ═══ TOAST ═══════════════════════════════════════════════════ -->
  <div id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
