  button { font-family: inherit; }
  input::placeholder { color: currentColor; opacity: 0.4; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  /* mobile-first: full-bleed phone, centered on desktop */
  .phone-host {
    width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .phone-host > .device {
    width: 100%; height: 100%; max-width: 440px; max-height: 920px;
  }
  @media (min-width: 460px) {
    .phone-host > .device {
      border-radius: 44px; border: 8px solid #1a1a1a; overflow: hidden;
      box-shadow: 0 30px 60px -20px rgba(0,0,0,0.25), 0 12px 24px -12px rgba(0,0,0,0.15);
    }
